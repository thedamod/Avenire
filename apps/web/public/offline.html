<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#94acd1" />
    <title>Offline - Avenire</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f1;
        --panel: #ffffff;
        --text: #222a39;
        --muted: #667085;
        --accent: #94acd1;
        --border: #e7e7ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 15% 0%, #eef2fb 0%, var(--bg) 50%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 1rem;
      }

      .card {
        width: min(560px, 100%);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: 0 10px 40px rgba(36, 42, 57, 0.08);
        padding: 2rem;
        text-align: center;
      }

      .logo {
        width: 56px;
        height: 56px;
        display: block;
        margin: 0 auto 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.7rem;
      }

      p {
        margin: 0.75rem auto 0;
        color: var(--muted);
        max-width: 44ch;
        line-height: 1.55;
      }

      button {
        margin-top: 1.5rem;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #0f172a;
        padding: 0.7rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/branding/avenire-logo-full.svg" alt="Avenire logo" />
      <h1>You are offline</h1>
      <p>Your connection dropped. Reconnect and try again to continue where you left off.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
